<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Tugas (Todo List)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="todo-container">
        <h1>Daftar Tugas Harian</h1>
        
        <form id="todo-form">
            <input type="text" id="todo-input" placeholder="Tambah tugas baru..." required autocomplete="off">
            <button type="submit" id="add-btn">Tambah</button>
        </form>

        <ul id="todo-list"></ul>
        
        <div class="footer">
            <p>Klik teks tugas untuk menandai selesai. Klik tombol hapus (❌) untuk menghapus.</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
