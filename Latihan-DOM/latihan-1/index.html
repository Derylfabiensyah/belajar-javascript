<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM</title>
    <style>
        html, body {
            height: 100%;
        }
        body {
            text-align: center;
        }
        .kotak {
            width: 25px;
            height: 25px;
            margin: 10px auto;
        }
        .merah {
            background-color: red;
        }
        .hijau {
            background-color: green;
        }
        .biru {
            background-color: blue;
        }
        .salmon {background-color: salmon;}
    </style>
</head>

<body>
    <h1>Bermain Dengan Warna</h1>
    <button id="tbl">tekan</button>

    <br>

    <div class="kotak merah"></div>
    <input type="range" name="sMerah" id="sMerah" min="0" max="255">

    <div class="kotak hijau"></div>
    <input type="range" name="sHijau" id="sHijau" min="0" max="255">

    <div class="kotak biru"></div>
    <input type="range" name="sBiru" id="sBiru" min="0" max="255">
    
    <br>
    <br>
    <script src="script.js"></script>
</body>

</html>
